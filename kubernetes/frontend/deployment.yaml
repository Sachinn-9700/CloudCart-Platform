apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: cloudcart

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: cloudcart-frontend:multistage
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"

            limits:
              memory: "128Mi"
              cpu: "100m"
              