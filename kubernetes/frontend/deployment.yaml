apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudcart

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: cloudcart-frontend:multistage

        imagePullPolicy: Never

        ports:
        - containerPort: 80

